{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-lg border-0">
      <div class="card-header text-center py-4"
           style="background:linear-gradient(135deg,#1a237e,#4a148c);color:#fff;">
        <h3 class="mb-0"><i class="bi bi-bar-chart-line-fill me-2"></i>ClarixRetail</h3>
        <small>Create your account</small>
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" required autofocus />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" required />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required minlength="6" />
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
            <i class="bi bi-person-plus me-1"></i> Create Account
          </button>
        </form>
        <hr />
        <p class="text-center mb-0 text-muted">
          Have an account?
          <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
