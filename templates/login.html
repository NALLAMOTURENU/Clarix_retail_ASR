{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-lg border-0">
      <div class="card-header text-center py-4"
           style="background:linear-gradient(135deg,#1a237e,#4a148c);color:#fff;">
        <h3 class="mb-0"><i class="bi bi-bar-chart-line-fill me-2"></i>ClarixRetail</h3>
        <small>Clarity through data</small>
      </div>
      <div class="card-body p-4">
        <h5 class="mb-3 text-center text-muted">Sign In</h5>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" required autofocus />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
          </button>
        </form>
        <hr />
        <p class="text-center mb-0 text-muted">
          No account?
          <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
